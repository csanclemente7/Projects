<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Macris</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome CDN for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <img src="https://www.macrisrefrigeracion.com/wp-content/uploads/2023/10/Macris-horizontal.png" alt="Logo de Macris" class="header-logo" />
      <h1 class="header-title">Dashboard de Aplicaciones</h1>
    </header>
    <main class="dashboard" id="dashboard-grid"></main>
  </div>

  <button id="add-app-fab" class="fab" aria-label="Añadir nueva aplicación">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- Modal Structure -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content" id="modal-content">
      <h2 id="modal-title">Añadir Nueva Aplicación</h2>
      <form id="modal-form" class="modal-form">
        <input type="hidden" id="app-id-input">
        <div class="form-group">
          <label for="appName">Nombre de la App</label>
          <input id="appName" type="text" placeholder="Ej: Reportes" required />
        </div>
        <div class="form-group">
          <label for="appUrl">URL de la App</label>
          <input id="appUrl" type="url" placeholder="https://ejemplo.com" required />
        </div>
        <div class="form-group">
          <label>Ícono</label>
          <div class="icon-picker" id="icon-picker">
            <!-- Icon options will be inserted by JS -->
          </div>
          <input type="hidden" id="app-icon-input" required>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn-cancel">Cancelar</button>
          <button type="submit" class="btn-save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Supabase Client Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Main App Script -->
  <script type="module" src="index.js"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
